###############################################################################
# HAProxy — SOCKS5 Proxy Rotator untuk Mega Crawler Bot
#
# Cara kerja:
#   Crawler -> HAProxy :1080 -> round-robin -> [SSH tunnel 1, tunnel 2, tunnel N]
#
# Setup SSH tunnel di terminal terpisah (tiap server = 1 IP baru):
#   ssh -D 1081 -N -f user@server1.example.com
#   ssh -D 1082 -N -f user@server2.example.com
#   ssh -D 1083 -N -f user@server3.example.com
#
# Install HAProxy:
#   Ubuntu/WSL  : sudo apt install haproxy
#   Windows     : pakai WSL2, atau binary dari https://haproxy.org/download
#
# Jalankan:
#   haproxy -f haproxy.cfg
#   haproxy -f haproxy.cfg -D   (daemon/background)
#
# Setelah jalan, set di .env:
#   PROXY_ENABLED=true
#   PROXY_LIST=socks5://127.0.0.1:1080
###############################################################################

global
    log stdout  format raw  local0  info
    maxconn     2000
    daemon

defaults
    mode        tcp
    log         global
    option      tcplog
    option      redispatch
    retries     2
    timeout connect  5s
    timeout client   30s
    timeout server   30s

#------------------------------------------------------------------------------
# Frontend: satu titik masuk untuk crawler
#------------------------------------------------------------------------------
frontend socks5_in
    bind        *:1080
    default_backend socks5_pool

#------------------------------------------------------------------------------
# Backend: daftar SSH tunnel / proxy server
# Tambah atau hapus baris "server" sesuai kebutuhan.
# HAProxy akan round-robin otomatis dan skip server yang mati (option tcp-check).
#------------------------------------------------------------------------------
backend socks5_pool
    balance     roundrobin
    option      tcp-check

    # Satu SSH tunnel = satu IP keluar.
    # Minimal 2 server supaya rotasi efektif.
    server  tunnel1  127.0.0.1:1081  check  inter 10s  rise 2  fall 3
    server  tunnel2  127.0.0.1:1082  check  inter 10s  rise 2  fall 3
    # server  tunnel3  127.0.0.1:1083  check  inter 10s  rise 2  fall 3
    # server  vps_remote  192.168.1.10:1080  check  inter 10s  rise 2  fall 3

#------------------------------------------------------------------------------
# Stats page (opsional)
# Buka http://127.0.0.1:8404/stats di browser untuk monitor status proxy pool
#------------------------------------------------------------------------------
frontend stats
    bind        *:8404
    mode        http
    stats enable
    stats uri   /stats
    stats refresh 10s
    stats auth  admin:crawlerbot
